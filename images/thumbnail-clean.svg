<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <!-- Clean Minimalist Version -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff8956;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>
  
  <!-- Geometric Pattern -->
  <g opacity="0.03">
    <circle cx="200" cy="150" r="100" fill="white"/>
    <circle cx="1080" cy="570" r="150" fill="white"/>
    <rect x="500" y="50" width="300" height="300" fill="white" transform="rotate(45 650 200)"/>
  </g>
  
  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="8" fill="url(#accent)"/>
  
  <!-- Main Content Card -->
  <g transform="translate(640, 360)">
    <!-- Card background -->
    <rect x="-520" y="-260" width="1040" height="520" rx="24" 
          fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
    
    <!-- Icon Circle -->
    <circle cx="0" cy="-120" r="80" fill="url(#accent)" filter="url(#shadow)"/>
    <text x="0" y="-90" font-size="70" text-anchor="middle">🎮</text>
    
    <!-- Main Title -->
    <text x="0" y="20" font-family="Inter, Arial, sans-serif" font-size="72" 
          font-weight="900" fill="white" text-anchor="middle" letter-spacing="-1">
      I Control My Rust Base
    </text>
    
    <!-- Subtitle -->
    <text x="0" y="90" font-family="Inter, Arial, sans-serif" font-size="56" 
          font-weight="700" fill="url(#accent)" text-anchor="middle" letter-spacing="-1">
      From Discord
    </text>
    
    <!-- Feature Pills -->
    <g transform="translate(0, 180)">
      <!-- Pill 1 -->
      <rect x="-400" y="-20" width="180" height="40" rx="20" fill="rgba(34,197,94,0.2)" stroke="#22c55e" stroke-width="2"/>
      <text x="-310" y="8" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#22c55e" text-anchor="middle">
        ✓ Real-time
      </text>
      
      <!-- Pill 2 -->
      <rect x="-200" y="-20" width="180" height="40" rx="20" fill="rgba(251,191,36,0.2)" stroke="#fbbf24" stroke-width="2"/>
      <text x="-110" y="8" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#fbbf24" text-anchor="middle">
        ⚡ 2 Minutes
      </text>
      
      <!-- Pill 3 -->
      <rect x="20" y="-20" width="180" height="40" rx="20" fill="rgba(88,101,242,0.2)" stroke="#5865F2" stroke-width="2"/>
      <text x="110" y="8" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#5865F2" text-anchor="middle">
        🔓 Free
      </text>
      
      <!-- Pill 4 -->
      <rect x="220" y="-20" width="180" height="40" rx="20" fill="rgba(167,139,250,0.2)" stroke="#a78bfa" stroke-width="2"/>
      <text x="310" y="8" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#a78bfa" text-anchor="middle">
        🛡️ 60+ Servers
      </text>
    </g>
  </g>
  
  <!-- Bottom branding -->
  <text x="640" y="680" font-family="Inter, sans-serif" font-size="28" 
        font-weight="800" fill="url(#accent)" text-anchor="middle" letter-spacing="2">
    RUSTINFO.ONLINE
  </text>
  
  <!-- Corner decoration -->
  <path d="M 0 0 L 60 0 L 0 60 Z" fill="url(#accent)" opacity="0.5"/>
  <path d="M 1280 720 L 1220 720 L 1280 660 Z" fill="url(#accent)" opacity="0.5"/>
</svg>
