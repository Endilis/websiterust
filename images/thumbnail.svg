<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0b0f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1b2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0b0f;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <radialGradient id="spotlight" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Main Background -->
  <rect width="1280" height="720" fill="url(#bgGrad)"/>
  
  <!-- Spotlight Effect -->
  <ellipse cx="640" cy="300" rx="600" ry="400" fill="url(#spotlight)"/>
  
  <!-- Decorative Elements -->
  <circle cx="100" cy="100" r="150" fill="#ff6b35" opacity="0.05"/>
  <circle cx="1180" cy="620" r="120" fill="#a78bfa" opacity="0.05"/>
  
  <!-- Discord Icon (simplified) -->
  <g transform="translate(180, 280)">
    <circle cx="60" cy="60" r="70" fill="#5865F2" opacity="0.2"/>
    <path d="M 30 45 Q 30 30 45 30 L 75 30 Q 90 30 90 45 L 90 75 Q 90 90 75 90 L 65 90 L 60 100 L 55 90 L 45 90 Q 30 90 30 75 Z" 
          fill="#5865F2" filter="url(#glow)"/>
    <circle cx="48" cy="55" r="6" fill="white"/>
    <circle cx="72" cy="55" r="6" fill="white"/>
    <path d="M 45 70 Q 60 78 75 70" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Arrow -->
  <g transform="translate(640, 360)">
    <path d="M -80 -5 L 40 -5 L 40 -20 L 80 0 L 40 20 L 40 5 L -80 5 Z" 
          fill="url(#orangeGrad)" filter="url(#glow)"/>
  </g>
  
  <!-- Rust Logo Representation -->
  <g transform="translate(1000, 280)">
    <circle cx="60" cy="60" r="70" fill="#ff6b35" opacity="0.2"/>
    <polygon points="60,20 90,45 90,75 60,100 30,75 30,45" 
             fill="none" stroke="url(#orangeGrad)" stroke-width="6" filter="url(#glow)"/>
    <circle cx="60" cy="60" r="25" fill="url(#orangeGrad)"/>
    <circle cx="60" cy="60" r="15" fill="#0a0b0f"/>
  </g>
  
  <!-- Main Title -->
  <text x="640" y="200" font-family="Impact, Arial Black, sans-serif" font-size="90" 
        font-weight="900" fill="white" text-anchor="middle" letter-spacing="2">
    CONTROL RUST
  </text>
  
  <!-- Subtitle -->
  <text x="640" y="265" font-family="Impact, Arial Black, sans-serif" font-size="90" 
        font-weight="900" fill="url(#orangeGrad)" text-anchor="middle" letter-spacing="2"
        filter="url(#glow)">
    FROM DISCORD
  </text>
  
  <!-- Bottom tagline -->
  <g transform="translate(640, 520)">
    <!-- FREE badge -->
    <rect x="-280" y="-25" width="150" height="50" rx="25" fill="#22c55e" filter="url(#glow)"/>
    <text x="-205" y="10" font-family="Arial, sans-serif" font-size="32" 
          font-weight="900" fill="white" text-anchor="middle">✓ FREE</text>
    
    <!-- 2 MIN badge -->
    <rect x="-100" y="-25" width="200" height="50" rx="25" fill="url(#orangeGrad)" filter="url(#glow)"/>
    <text x="0" y="10" font-family="Arial, sans-serif" font-size="32" 
          font-weight="900" fill="white" text-anchor="middle">⚡ 2 MIN</text>
    
    <!-- SETUP text -->
    <text x="150" y="10" font-family="Arial, sans-serif" font-size="36" 
          font-weight="700" fill="white" text-anchor="start">SETUP</text>
  </g>
  
  <!-- RustInfo Branding -->
  <g transform="translate(100, 620)">
    <rect x="0" y="0" width="200" height="60" rx="10" fill="rgba(255,255,255,0.05)"/>
    <text x="100" y="40" font-family="Arial, sans-serif" font-size="32" 
          font-weight="800" fill="url(#orangeGrad)" text-anchor="middle">RustInfo</text>
  </g>
  
  <!-- Decorative lines -->
  <line x1="0" y1="360" x2="150" y2="360" stroke="url(#orangeGrad)" stroke-width="3" opacity="0.5"/>
  <line x1="1130" y1="360" x2="1280" y2="360" stroke="url(#orangeGrad)" stroke-width="3" opacity="0.5"/>
</svg>
